x-payment-service: &payment-service
  image: payment_service
  build:
    context: .
  env_file:
    - .env

services:
  postgres:
    image: postgres:18-alpine
    container_name: payments.postgres
    environment:
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_DB: $POSTGRES_DB
    expose:
      - 5432
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgres.data:/var/lib/postgresql:rw
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 60s
      retries: 5
      start_period: 10s

  nats:
    image: nats:2.10-alpine
    container_name: payments.nats
    command: ["-js", "-m", "8222"]
    ports:
      - "127.0.0.1:${NATS_PORT}:4222"
      - "127.0.0.1:${NATS_MONITOR_PORT}:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres_migration:
    <<: *payment-service
    container_name: payments.postgres_migration
    restart: no
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./alembic.ini:/app/alembic.ini:ro
    command: ["python", "-m", "alembic", "upgrade", "head"]

  api:
    <<: *payment-service
    container_name: payments.api
    ports:
      - "127.0.0.1:${API_PORT}:${API_PORT}"
    depends_on:
      postgres_migration:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    restart: unless-stopped
    command: [
      "uvicorn", "highload_payments.apps.api.main:app",
      "--host", "0.0.0.0",
      "--port", "${API_PORT}"
    ]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${API_PORT}/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  worker:
    <<: *payment-service
    container_name: payments.worker
    depends_on:
      postgres_migration:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "highload_payments.apps.worker.main"]

  dispatcher:
    <<: *payment-service
    container_name: payments.dispatcher
    depends_on:
      postgres_migration:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
    restart: unless-stopped
    command: ["python", "-m", "highload_payments.apps.dispatcher.main"]


volumes:
  postgres.data:
    name: payments.postgres.data

networks:
  default:
    name: payments.network
